services:
  kinotower-postgres:
    image: postgres:18.1-bookworm
    container_name: kinotower-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  kinotower-postgres-migrate:
    image: migrate/migrate:v4.19.1
    container_name: kinotower-postgres-migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations